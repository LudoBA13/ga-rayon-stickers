<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Étiquettes Rayon</title>
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800;900&display=swap" rel="stylesheet">
	<style>
		@page
		{
			size: A4;
			margin: 1cm 0 0 0;
		}

		body
		{
			margin: 0;
			padding: 0;
			font-family: 'Poppins', sans-serif;
		}

		.page
		{
			width: 210mm;
			padding: 0;
			margin: 0 auto;
			display: flex;
			flex-wrap: wrap;
			align-content: flex-start;
			box-sizing: border-box;
		}

		.sticker
		{
			width: 105mm;
			height: 25mm;
			box-sizing: border-box;
			display: flex;
			overflow: hidden;
			outline: 1px solid #00000020;
			break-inside: avoid;
		}

		.name-area
		{
			width: 70mm;
			height: 100%;
			display: flex;
			align-items: center;
			padding: 0 2mm;
			box-sizing: border-box;
			overflow: hidden;
		}

		.name-text
		{
			font-size: 36pt;
			font-weight: 800;
			line-height: 0.85;
			text-transform: uppercase;
			white-space: normal;
			word-break: keep-all;
			overflow-wrap: normal;
			flex: 1;
			width: 100%;
		}

		.name-text.has-diacritics
		{
			line-height: 1.0;
		}

		.price-area
		{
			width: 35mm;
			height: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #000;
			text-align: center;
			padding: 1mm 1mm;
			box-sizing: border-box;
		}

		.price-text
		{
			height: 100%;
			width: 100%;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			align-items: center;
		}

		.fit-wrapper
		{
			width: 100%;
			height: 100%;
			display: flex;
			align-items: center;
		}

		.price-value-container
		{
			flex-grow: 1;
			display: flex;
			align-items: center;
			width: 100%;
			overflow: hidden;
		}

		.price-value
		{
			font-size: 48pt;
			font-weight: 800;
			line-height: 0.75;
			display: inline-block;
			letter-spacing: -2px;
			transform: scaleX(0.85);
			transform-origin: center;
			white-space: nowrap;
			width: 100%;
		}

		.price-subtext
		{
			font-size: 9pt;
			font-weight: 400;
			text-transform: uppercase;
			line-height: 0.9;
		}

		@media print
		{
			.page
			{
				width: auto;
				margin: 0;
			}
		}
	</style>
</head>
<body>
	<div class="page" id="sticker-container"></div>

	<script>
		function fitText(element)
		{
			// The parent is now the .fit-wrapper which respects its parent's padding
			// but has no padding itself.
			const parent = element.parentElement;
			let fontSizePt = parseFloat(window.getComputedStyle(element).fontSize) * 0.75;

			const isOverflowing = () =>
			{
				return element.scrollHeight > parent.clientHeight || element.scrollWidth > parent.clientWidth;
			};

			while (isOverflowing() && fontSizePt > 5)
			{
				fontSizePt -= 0.5;
				element.style.fontSize = fontSizePt + 'pt';
			}
		}

		function addSticker(item, price, refPrice)
		{
			const container = document.getElementById('sticker-container');
			const sticker = document.createElement('div');
			sticker.className = 'sticker';

			const format = (val) => val.toLocaleString('fr-FR',
			{
				minimumFractionDigits: 2,
				maximumFractionDigits: 2
			});

			const formattedPrice = format(price);
			const formattedRef = format(refPrice);

			// Detect diacritics (including common French accents)
			const formattedItem = item.replace(/\s*\/\s*/g, '\u2044');
			const hasDiacritics = /[àâäçéèêëîïôöùûüÿ]/i.test(formattedItem);
			const nameClass = hasDiacritics ? 'name-text has-diacritics' : 'name-text';

			sticker.innerHTML = `
				<div class="name-area">
					<div class="fit-wrapper">
						<div class="${nameClass}">${formattedItem}</div>
					</div>
				</div>
				<div class="price-area">
					<div class="price-text">
						<div class="price-subtext">Prix au kilo en €</div>
						<div class="price-value-container">
							<div class="price-value">${formattedPrice}</div>
						</div>
						<div class="price-subtext">Prix réf : ${formattedRef} €</div>
					</div>
				</div>
			`;

			container.appendChild(sticker);

			// Fit text after adding to DOM
			fitText(sticker.querySelector('.name-text'));
			fitText(sticker.querySelector('.price-value'));
		}

		async function init()
		{
			// Create a promise for data retrieval
			const fetchData = new Promise((resolve, reject) =>
			{
				google.script.run
					.withSuccessHandler(data =>
					{
						data.forEach(row =>
						{
							if (row[0])
							{
								addSticker(row[0], row[1], row[2]);
							}
						});
						resolve();
					})
					.withFailureHandler(reject)
					.getSheetData();
			});

			// Execute font loading and data retrieval in parallel
			await Promise.all([document.fonts.ready, fetchData]);
			window.print();
		}

		window.onload = init;

		window.onafterprint = () =>
		{
			try
			{
				window.close();
			}
			catch (e)
			{
				// Ignore close errors
			}
		};
	</script>
</body>
</html>
